version: '3.8'

services:
  # WealthWatch Application (Python / FastAPI + SQLite)
  app:
    build: .
    container_name: wealthwatch-app
    ports:
      - "8080:8080"
    environment:
      - SQLITE_DB_PATH=/data/wealthwatch.db
      - JWT_SECRET=your_super_secret_jwt_key_change_this_in_production
      - JWT_EXPIRES_IN=168h
      - PORT=8080
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: wealthwatch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  sqlite_data:
  redis_data:
