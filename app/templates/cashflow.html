{% extends "base.html" %}
{% block title %}Cash Flow - WealthWatch{% endblock %}
{% block content %}
<div x-data="cashflowPage()" x-init="load()" x-cloak class="max-w-5xl mx-auto px-4 py-8">

  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Cash Flow</h1>
    <p class="text-sm text-gray-500 mt-1">Income vs expenses breakdown by month</p>
  </div>

  <!-- Month Picker -->
  <div class="bg-white rounded-lg shadow-sm border p-4 mb-6">
    <div class="flex items-center gap-3 flex-wrap">
      <label class="text-sm font-medium text-gray-700">Select Month:</label>
      <input x-model="selectedMonth" type="month"
             class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm">
      <button @click="loadData()" :disabled="loadingData"
              class="inline-flex items-center gap-2 bg-brand-600 text-white px-4 py-2 rounded-lg hover:bg-brand-700 transition text-sm font-medium disabled:opacity-50">
        <template x-if="!loadingData"><i class="fas fa-search text-xs"></i></template>
        <template x-if="loadingData"><i class="fas fa-spinner fa-spin text-xs"></i></template>
        <span x-text="loadingData ? 'Loading...' : 'Load'"></span>
      </button>
    </div>
  </div>

  <!-- Loading initial -->
  <template x-if="loading">
    <div class="text-center py-16">
      <i class="fas fa-spinner fa-spin text-2xl text-brand-500"></i>
      <p class="text-gray-500 mt-3 text-sm">Loading cash flow...</p>
    </div>
  </template>

  <!-- Error -->
  <template x-if="error">
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm mb-6" x-text="error"></div>
  </template>

  <!-- No Data -->
  <template x-if="!loading && loaded && !hasData">
    <div class="bg-white rounded-lg shadow-sm border p-12 text-center">
      <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-chart-line text-gray-400 text-2xl"></i>
      </div>
      <h3 class="text-lg font-semibold text-gray-900">No data for this month</h3>
      <p class="text-gray-500 text-sm mt-2">There are no income or expense transactions recorded for the selected period.</p>
    </div>
  </template>

  <!-- Cash Flow Data -->
  <template x-if="!loading && loaded && hasData">
    <div class="space-y-6">

      <!-- Net Cash Flow Card -->
      <div class="bg-white rounded-lg shadow-sm border p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <!-- Total Income -->
          <div class="text-center">
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Total Income</p>
            <p class="text-3xl font-bold text-green-600" x-text="money(totalIncome)"></p>
          </div>
          <!-- Net -->
          <div class="text-center">
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Net Cash Flow</p>
            <p class="text-3xl font-bold" :class="netCashFlow >= 0 ? 'text-green-600' : 'text-red-600'"
               x-text="(netCashFlow >= 0 ? '+' : '') + money(netCashFlow)"></p>
            <div class="mt-2 inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium"
                 :class="netCashFlow >= 0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'">
              <i :class="netCashFlow >= 0 ? 'fas fa-arrow-up' : 'fas fa-arrow-down'" class="text-[10px]"></i>
              <span x-text="totalIncome > 0 ? Math.abs(netCashFlow / totalIncome * 100).toFixed(1) + '% of income' : 'N/A'"></span>
            </div>
          </div>
          <!-- Total Expenses -->
          <div class="text-center">
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Total Expenses</p>
            <p class="text-3xl font-bold text-red-600" x-text="money(totalExpenses)"></p>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <!-- Income Breakdown -->
        <div class="bg-white rounded-lg shadow-sm border p-6">
          <div class="flex items-center gap-2 mb-4">
            <div class="w-3 h-3 bg-green-500 rounded-full"></div>
            <h2 class="text-lg font-semibold text-gray-900">Income</h2>
            <span class="ml-auto text-sm font-bold text-green-600" x-text="money(totalIncome)"></span>
          </div>
          <template x-if="incomeItems.length === 0">
            <p class="text-sm text-gray-400 py-4 text-center">No income recorded</p>
          </template>
          <div class="space-y-3">
            <template x-for="(item, idx) in incomeItems" :key="idx">
              <div>
                <div class="flex items-center justify-between mb-1">
                  <span class="text-sm font-medium text-gray-700" x-text="item.name"></span>
                  <span class="text-sm font-semibold text-gray-900" x-text="money(item.amount)"></span>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-2.5">
                  <div class="bg-green-500 h-2.5 rounded-full transition-all"
                       :style="'width:' + (totalIncome > 0 ? (item.amount / totalIncome * 100) : 0) + '%'"></div>
                </div>
                <p class="text-xs text-gray-400 mt-0.5" x-text="totalIncome > 0 ? (item.amount / totalIncome * 100).toFixed(1) + '% of income' : ''"></p>
              </div>
            </template>
          </div>
        </div>

        <!-- Expense Breakdown -->
        <div class="bg-white rounded-lg shadow-sm border p-6">
          <div class="flex items-center gap-2 mb-4">
            <div class="w-3 h-3 bg-red-500 rounded-full"></div>
            <h2 class="text-lg font-semibold text-gray-900">Expenses</h2>
            <span class="ml-auto text-sm font-bold text-red-600" x-text="money(totalExpenses)"></span>
          </div>
          <template x-if="expenseItems.length === 0">
            <p class="text-sm text-gray-400 py-4 text-center">No expenses recorded</p>
          </template>
          <div class="space-y-3">
            <template x-for="(item, idx) in expenseItems" :key="idx">
              <div>
                <div class="flex items-center justify-between mb-1">
                  <span class="text-sm font-medium text-gray-700" x-text="item.name"></span>
                  <span class="text-sm font-semibold text-gray-900" x-text="money(item.amount)"></span>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-2.5">
                  <div class="bg-red-500 h-2.5 rounded-full transition-all"
                       :style="'width:' + (totalExpenses > 0 ? (item.amount / totalExpenses * 100) : 0) + '%'"></div>
                </div>
                <p class="text-xs text-gray-400 mt-0.5" x-text="totalExpenses > 0 ? (item.amount / totalExpenses * 100).toFixed(1) + '% of expenses' : ''"></p>
              </div>
            </template>
          </div>
        </div>

      </div>
    </div>
  </template>

</div>

<script>
function cashflowPage() {
  const token = localStorage.getItem('token');
  const headers = {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'};
  const api = async (method, path, body) => {
    const opts = {method, headers};
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch('/api/v1' + path, opts);
    if (res.status === 401) { window.location.href = '/login'; return null; }
    if (res.status === 204) return null;
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail || 'Failed'); }
    return res.json();
  };
  const money = (n) => '$' + (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';

  // Default to current month
  const now = new Date();
  const defaultMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');

  return {
    selectedMonth: defaultMonth,
    loading: true,
    loadingData: false,
    loaded: false,
    error: '',
    incomeItems: [],
    expenseItems: [],

    money, fmtDate,

    get totalIncome() {
      return this.incomeItems.reduce((s, i) => s + i.amount, 0);
    },
    get totalExpenses() {
      return this.expenseItems.reduce((s, i) => s + i.amount, 0);
    },
    get netCashFlow() {
      return this.totalIncome - this.totalExpenses;
    },
    get hasData() {
      return this.incomeItems.length > 0 || this.expenseItems.length > 0;
    },

    async load() {
      await this.loadData();
      this.loading = false;
    },

    async loadData() {
      this.loadingData = true;
      this.error = '';
      try {
        const [y, m] = this.selectedMonth.split('-').map(Number);
        const data = await api('GET', '/reports/cashflow-sankey?year=' + y + '&month=' + m);
        if (!data) return;

        // Parse sankey nodes/links into income and expense items
        this.incomeItems = [];
        this.expenseItems = [];

        const nodeMap = {};
        (data.nodes || []).forEach(n => { nodeMap[n.id] = n.name; });

        (data.links || []).forEach(link => {
          if (link.target === 'income' && link.source !== 'income') {
            // Income source -> income node
            this.incomeItems.push({ name: nodeMap[link.source] || link.source, amount: link.value });
          } else if (link.source === 'expenses' && link.target !== 'expenses') {
            // Expenses node -> expense category
            this.expenseItems.push({ name: nodeMap[link.target] || link.target, amount: link.value });
          }
        });

        // Sort by amount descending
        this.incomeItems.sort((a, b) => b.amount - a.amount);
        this.expenseItems.sort((a, b) => b.amount - a.amount);
        this.loaded = true;
      } catch (e) { this.error = e.message; }
      finally { this.loadingData = false; }
    }
  };
}
</script>
{% endblock %}
