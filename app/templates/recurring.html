{% extends "base.html" %}
{% block title %}Recurring Bills - WealthWatch{% endblock %}
{% block content %}
<div x-data="recurringPage()" x-init="load()" x-cloak class="max-w-5xl mx-auto px-4 py-8">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Recurring Bills</h1>
      <p class="text-sm text-gray-500 mt-1">Track subscriptions & recurring payments</p>
    </div>
    <button @click="showModal = true; resetForm()"
            class="inline-flex items-center gap-2 bg-brand-600 text-white px-4 py-2.5 rounded-lg hover:bg-brand-700 transition text-sm font-medium shadow-sm">
      <i class="fas fa-plus text-xs"></i> Add Subscription
    </button>
  </div>

  <!-- Summary Cards -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
    <div class="bg-white rounded-lg shadow-sm border p-4">
      <p class="text-xs font-medium text-gray-500 uppercase tracking-wide">Total Monthly</p>
      <p class="text-2xl font-bold text-gray-900 mt-1" x-text="money(totalMonthly)"></p>
    </div>
    <div class="bg-white rounded-lg shadow-sm border p-4">
      <p class="text-xs font-medium text-gray-500 uppercase tracking-wide">Active Bills</p>
      <p class="text-2xl font-bold text-brand-600 mt-1" x-text="bills.filter(b=>b.is_active).length"></p>
    </div>
    <div class="bg-white rounded-lg shadow-sm border p-4">
      <p class="text-xs font-medium text-gray-500 uppercase tracking-wide">Due This Week</p>
      <p class="text-2xl font-bold text-amber-600 mt-1" x-text="dueThisWeek"></p>
    </div>
  </div>

  <!-- Loading -->
  <template x-if="loading">
    <div class="text-center py-16">
      <i class="fas fa-spinner fa-spin text-2xl text-brand-500"></i>
      <p class="text-gray-500 mt-3 text-sm">Loading bills...</p>
    </div>
  </template>

  <!-- Empty State -->
  <template x-if="!loading && bills.length === 0">
    <div class="bg-white rounded-lg shadow-sm border p-12 text-center">
      <div class="w-16 h-16 bg-brand-50 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-sync-alt text-brand-400 text-2xl"></i>
      </div>
      <h3 class="text-lg font-semibold text-gray-900">No recurring bills yet</h3>
      <p class="text-gray-500 text-sm mt-2">Add your subscriptions and recurring payments to keep track of them.</p>
      <button @click="showModal = true; resetForm()"
              class="mt-4 inline-flex items-center gap-2 bg-brand-600 text-white px-4 py-2 rounded-lg hover:bg-brand-700 text-sm font-medium">
        <i class="fas fa-plus text-xs"></i> Add Your First Bill
      </button>
    </div>
  </template>

  <!-- Bills List -->
  <template x-if="!loading && bills.length > 0">
    <div class="space-y-3">
      <template x-for="bill in bills" :key="bill.id">
        <div class="bg-white rounded-lg shadow-sm border p-4 hover:shadow-md transition">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-4 min-w-0 flex-1">
              <!-- Icon -->
              <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0"
                   :class="bill.is_active ? 'bg-brand-50' : 'bg-gray-100'">
                <i class="fas fa-receipt" :class="bill.is_active ? 'text-brand-500' : 'text-gray-400'"></i>
              </div>
              <!-- Info -->
              <div class="min-w-0 flex-1">
                <div class="flex items-center gap-2 flex-wrap">
                  <h3 class="font-semibold text-gray-900 truncate" x-text="bill.merchant"></h3>
                  <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-50 text-blue-700"
                        x-text="bill.frequency"></span>
                  <span x-show="getCategoryName(bill.category_id)"
                        class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-purple-50 text-purple-700"
                        x-text="getCategoryName(bill.category_id)"></span>
                </div>
                <div class="flex items-center gap-3 mt-1 text-sm text-gray-500">
                  <span><i class="far fa-calendar-alt mr-1"></i> Next: <span x-text="fmtDate(bill.next_due_date)"></span></span>
                  <span x-show="bill.notes" class="truncate max-w-xs" x-text="bill.notes"></span>
                </div>
              </div>
            </div>
            <!-- Amount & Actions -->
            <div class="flex items-center gap-4 flex-shrink-0 ml-4">
              <span class="text-lg font-bold text-gray-900" x-text="money(bill.amount)"></span>
              <button @click="deleteBill(bill.id)"
                      class="w-8 h-8 rounded-lg flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 transition"
                      title="Delete">
                <i class="fas fa-trash-alt text-sm"></i>
              </button>
            </div>
          </div>
        </div>
      </template>
    </div>
  </template>

  <!-- Error -->
  <template x-if="error">
    <div class="mt-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm" x-text="error"></div>
  </template>

  <!-- Add Modal -->
  <div x-show="showModal" x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40">
    <div @click.outside="showModal = false" x-transition
         class="bg-white rounded-xl shadow-xl w-full max-w-lg">
      <div class="flex items-center justify-between px-6 py-4 border-b">
        <h2 class="text-lg font-semibold text-gray-900">Add Subscription</h2>
        <button @click="showModal = false" class="text-gray-400 hover:text-gray-600">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form @submit.prevent="createBill()" class="p-6 space-y-4">
        <!-- Merchant -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Merchant / Service</label>
          <input x-model="form.merchant" type="text" required placeholder="e.g. Netflix, Spotify"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm">
        </div>
        <!-- Amount & Frequency -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Amount</label>
            <input x-model="form.amount" type="number" step="0.01" min="0" required placeholder="0.00"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Frequency</label>
            <select x-model="form.frequency" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm">
              <option value="weekly">Weekly</option>
              <option value="biweekly">Biweekly</option>
              <option value="monthly" selected>Monthly</option>
              <option value="quarterly">Quarterly</option>
              <option value="yearly">Yearly</option>
            </select>
          </div>
        </div>
        <!-- Next Due Date -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Next Due Date</label>
          <input x-model="form.next_due_date" type="date" required
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm">
        </div>
        <!-- Category -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Category <span class="text-gray-400 font-normal">(optional)</span></label>
          <select x-model="form.category_id"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm">
            <option value="">— None —</option>
            <template x-for="cat in categories" :key="cat.id">
              <option :value="cat.id" x-text="cat.name"></option>
            </template>
          </select>
        </div>
        <!-- Notes -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Notes <span class="text-gray-400 font-normal">(optional)</span></label>
          <input x-model="form.notes" type="text" placeholder="Any extra details..."
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm">
        </div>
        <!-- Error -->
        <div x-show="formError" class="bg-red-50 border border-red-200 text-red-700 px-3 py-2 rounded-lg text-sm" x-text="formError"></div>
        <!-- Actions -->
        <div class="flex justify-end gap-3 pt-2">
          <button type="button" @click="showModal = false"
                  class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition">Cancel</button>
          <button type="submit" :disabled="saving"
                  class="px-4 py-2 text-sm font-medium text-white bg-brand-600 rounded-lg hover:bg-brand-700 transition disabled:opacity-50">
            <span x-show="!saving">Add Subscription</span>
            <span x-show="saving"><i class="fas fa-spinner fa-spin mr-1"></i> Saving...</span>
          </button>
        </div>
      </form>
    </div>
  </div>

</div>

<script>
function recurringPage() {
  const token = localStorage.getItem('token');
  const headers = {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'};
  const api = async (method, path, body) => {
    const opts = {method, headers};
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch('/api/v1' + path, opts);
    if (res.status === 401) { window.location.href = '/login'; return null; }
    if (res.status === 204) return null;
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail || 'Failed'); }
    return res.json();
  };
  const money = (n) => '$' + (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';

  const freqMultiplier = {weekly:4.33,biweekly:2.17,monthly:1,quarterly:1/3,yearly:1/12};

  return {
    bills: [],
    categories: [],
    loading: true,
    error: '',
    showModal: false,
    saving: false,
    formError: '',
    form: {merchant:'', amount:'', frequency:'monthly', next_due_date:'', category_id:'', notes:''},

    get totalMonthly() {
      return this.bills.filter(b=>b.is_active).reduce((s,b) => s + (b.amount * (freqMultiplier[b.frequency]||1)), 0);
    },
    get dueThisWeek() {
      const now = new Date(); const week = new Date(now.getTime() + 7*86400000);
      return this.bills.filter(b => { const d = new Date(b.next_due_date); return b.is_active && d >= now && d <= week; }).length;
    },

    money, fmtDate,

    getCategoryName(id) {
      if (!id) return '';
      const c = this.categories.find(c => c.id === id);
      return c ? c.name : '';
    },

    resetForm() {
      this.form = {merchant:'', amount:'', frequency:'monthly', next_due_date:'', category_id:'', notes:''};
      this.formError = '';
    },

    async load() {
      try {
        const [bills, cats] = await Promise.all([api('GET','/recurring'), api('GET','/budget/categories')]);
        this.bills = bills || [];
        this.categories = cats || [];
      } catch (e) { this.error = e.message; }
      finally { this.loading = false; }
    },

    async createBill() {
      this.saving = true; this.formError = '';
      try {
        const body = {
          merchant: this.form.merchant,
          amount: parseFloat(this.form.amount),
          frequency: this.form.frequency,
          next_due_date: this.form.next_due_date,
          category_id: this.form.category_id ? parseInt(this.form.category_id) : null,
          notes: this.form.notes
        };
        const bill = await api('POST', '/recurring', body);
        if (bill) { this.bills.push(bill); this.bills.sort((a,b) => new Date(a.next_due_date) - new Date(b.next_due_date)); }
        this.showModal = false;
      } catch (e) { this.formError = e.message; }
      finally { this.saving = false; }
    },

    async deleteBill(id) {
      if (!confirm('Delete this recurring bill?')) return;
      try {
        await api('DELETE', '/recurring/' + id);
        this.bills = this.bills.filter(b => b.id !== id);
      } catch (e) { this.error = e.message; }
    }
  };
}
</script>
{% endblock %}
