{% extends "base.html" %}
{% block title %}Accounts — WealthWatch{% endblock %}
{% block content %}
<div x-data="accountsPage()" x-init="load()" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Accounts</h1>
      <p class="mt-1 text-sm text-gray-500">Manage your financial accounts</p>
    </div>
    <div class="flex items-center gap-3">
      <!-- Ownership Filter -->
      <select x-model="ownershipFilter" @change="load()"
              class="rounded-lg border-gray-300 bg-white shadow-sm text-sm focus:ring-indigo-500 focus:border-indigo-500 py-2 pl-3 pr-8">
        <option value="">All Accounts</option>
        <option value="yours">Yours</option>
        <option value="mine">Mine</option>
        <option value="ours">Ours</option>
      </select>
      <!-- Add Account Button -->
      <button @click="openAdd()"
              class="inline-flex items-center gap-2 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        Add Account
      </button>
    </div>
  </div>

  <!-- Loading State -->
  <div x-show="loading" class="flex justify-center py-20">
    <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
  </div>

  <!-- Empty State -->
  <div x-show="!loading && accounts.length === 0" x-cloak class="text-center py-20">
    <svg class="mx-auto h-12 w-12 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z"/>
    </svg>
    <h3 class="mt-3 text-sm font-semibold text-gray-900">No accounts</h3>
    <p class="mt-1 text-sm text-gray-500">Get started by adding your first account.</p>
    <button @click="openAdd()" class="mt-4 inline-flex items-center gap-2 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
      Add Account
    </button>
  </div>

  <!-- Account Cards Grid -->
  <div x-show="!loading && accounts.length > 0" x-cloak
       class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
    <template x-for="acc in accounts" :key="acc.id">
      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5 hover:shadow-md transition-shadow">
        <!-- Card Header -->
        <div class="flex items-start justify-between mb-3">
          <div class="min-w-0 flex-1">
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide" x-text="acc.institution_name"></p>
            <h3 class="mt-1 text-base font-semibold text-gray-900 truncate" x-text="acc.account_name"></h3>
          </div>
          <div class="flex items-center gap-1.5 ml-3 flex-shrink-0">
            <button @click="openEdit(acc)" title="Edit"
                    class="p-1.5 rounded-md text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
              </svg>
            </button>
            <button @click="confirmDelete(acc)" title="Delete"
                    class="p-1.5 rounded-md text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>
        </div>
        <!-- Badges -->
        <div class="flex items-center gap-2 mb-4">
          <span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium bg-blue-100 text-blue-800"
                x-text="typeLabel(acc.account_type)"></span>
          <span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium"
                :class="ownershipBadge(acc.ownership)"
                x-text="acc.ownership.charAt(0).toUpperCase() + acc.ownership.slice(1)"></span>
        </div>
        <!-- Balance -->
        <div class="pt-3 border-t border-gray-100">
          <p class="text-xs text-gray-500">Balance</p>
          <p class="text-xl font-bold"
             :class="acc.is_asset ? 'text-emerald-600' : 'text-red-600'"
             x-text="money(acc.balance)"></p>
        </div>
      </div>
    </template>
  </div>

  <!-- Add / Edit Modal -->
  <div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center">
    <div class="fixed inset-0 bg-black/50" @click="showModal = false"></div>
    <div class="relative bg-white rounded-lg shadow-xl p-6 w-full max-w-md mx-4" @click.stop>
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-semibold text-gray-900" x-text="editingId ? 'Edit Account' : 'Add Account'"></h2>
        <button @click="showModal = false" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form @submit.prevent="save()" class="space-y-4">
        <!-- Institution Name -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Institution Name</label>
          <input type="text" x-model="form.institution_name" required :disabled="!!editingId"
                 class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm disabled:bg-gray-100 disabled:text-gray-500"
                 placeholder="e.g. Chase, Vanguard">
        </div>
        <!-- Account Name -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Account Name</label>
          <input type="text" x-model="form.account_name" required
                 class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                 placeholder="e.g. Primary Checking">
        </div>
        <!-- Account Type -->
        <div x-show="!editingId">
          <label class="block text-sm font-medium text-gray-700 mb-1">Account Type</label>
          <select x-model="form.account_type" required
                  class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm">
            <option value="">Select type...</option>
            <option value="checking">Checking</option>
            <option value="savings">Savings</option>
            <option value="credit_card">Credit Card</option>
            <option value="investment">Investment</option>
            <option value="loan">Loan</option>
            <option value="mortgage">Mortgage</option>
            <option value="real_estate">Real Estate</option>
            <option value="other">Other</option>
          </select>
        </div>
        <!-- Ownership -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Ownership</label>
          <select x-model="form.ownership" required
                  class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm">
            <option value="ours">Ours</option>
            <option value="yours">Yours</option>
            <option value="mine">Mine</option>
          </select>
        </div>
        <!-- Balance -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Balance</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500 text-sm">$</span>
            <input type="number" step="0.01" x-model.number="form.balance" required
                   class="w-full pl-7 rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                   placeholder="0.00">
          </div>
        </div>
        <!-- Error Message -->
        <p x-show="formError" x-text="formError" class="text-sm text-red-600"></p>
        <!-- Buttons -->
        <div class="flex justify-end gap-3 pt-2">
          <button type="button" @click="showModal = false"
                  class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
            Cancel
          </button>
          <button type="submit" :disabled="saving"
                  class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500 disabled:opacity-50 transition-colors">
            <span x-show="!saving" x-text="editingId ? 'Update' : 'Create'"></span>
            <span x-show="saving">Saving...</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div x-show="showDeleteModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center">
    <div class="fixed inset-0 bg-black/50" @click="showDeleteModal = false"></div>
    <div class="relative bg-white rounded-lg shadow-xl p-6 w-full max-w-sm mx-4" @click.stop>
      <div class="flex items-center gap-3 mb-4">
        <div class="flex-shrink-0 flex items-center justify-center h-10 w-10 rounded-full bg-red-100">
          <svg class="h-5 w-5 text-red-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
          </svg>
        </div>
        <div>
          <h3 class="text-base font-semibold text-gray-900">Delete Account</h3>
          <p class="text-sm text-gray-500">This action cannot be undone.</p>
        </div>
      </div>
      <p class="text-sm text-gray-600 mb-5">
        Are you sure you want to delete <strong x-text="deletingAccount?.account_name"></strong>?
      </p>
      <div class="flex justify-end gap-3">
        <button @click="showDeleteModal = false"
                class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
          Cancel
        </button>
        <button @click="doDelete()" :disabled="saving"
                class="rounded-lg bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-500 disabled:opacity-50 transition-colors">
          <span x-show="!saving">Delete</span>
          <span x-show="saving">Deleting...</span>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
function accountsPage() {
  const token = localStorage.getItem('token');
  const headers = {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'};
  const api = async (method, path, body) => {
    const opts = {method, headers};
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch('/api/v1' + path, opts);
    if (res.status === 401) { window.location.href = '/login'; return null; }
    if (res.status === 204) return null;
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail || 'Failed'); }
    return res.json();
  };
  const money = (n) => '$' + (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  return {
    accounts: [],
    loading: true,
    ownershipFilter: '',
    showModal: false,
    showDeleteModal: false,
    editingId: null,
    deletingAccount: null,
    saving: false,
    formError: '',
    form: {
      institution_name: '',
      account_name: '',
      account_type: '',
      ownership: 'ours',
      balance: 0,
    },

    money,

    typeLabel(t) {
      const labels = {
        checking: 'Checking', savings: 'Savings', credit_card: 'Credit Card',
        investment: 'Investment', loan: 'Loan', mortgage: 'Mortgage',
        real_estate: 'Real Estate', other: 'Other',
      };
      return labels[t] || t;
    },

    ownershipBadge(o) {
      const map = {
        ours:  'bg-purple-100 text-purple-800',
        yours: 'bg-teal-100 text-teal-800',
        mine:  'bg-amber-100 text-amber-800',
      };
      return map[o] || 'bg-gray-100 text-gray-800';
    },

    async load() {
      this.loading = true;
      try {
        let path = '/accounts';
        if (this.ownershipFilter) path += '?ownership=' + this.ownershipFilter;
        this.accounts = await api('GET', path) || [];
      } catch (e) {
        console.error('Failed to load accounts:', e);
        this.accounts = [];
      } finally {
        this.loading = false;
      }
    },

    openAdd() {
      this.editingId = null;
      this.formError = '';
      this.form = {
        institution_name: '',
        account_name: '',
        account_type: '',
        ownership: 'ours',
        balance: 0,
      };
      this.showModal = true;
    },

    openEdit(acc) {
      this.editingId = acc.id;
      this.formError = '';
      this.form = {
        institution_name: acc.institution_name,
        account_name: acc.account_name,
        account_type: acc.account_type,
        ownership: acc.ownership,
        balance: acc.balance,
      };
      this.showModal = true;
    },

    async save() {
      this.saving = true;
      this.formError = '';
      try {
        if (this.editingId) {
          await api('PUT', '/accounts/' + this.editingId, {
            account_name: this.form.account_name,
            balance: this.form.balance,
            ownership: this.form.ownership,
          });
        } else {
          if (!this.form.account_type) {
            this.formError = 'Please select an account type.';
            this.saving = false;
            return;
          }
          await api('POST', '/accounts', this.form);
        }
        this.showModal = false;
        await this.load();
      } catch (e) {
        this.formError = e.message;
      } finally {
        this.saving = false;
      }
    },

    confirmDelete(acc) {
      this.deletingAccount = acc;
      this.showDeleteModal = true;
    },

    async doDelete() {
      if (!this.deletingAccount) return;
      this.saving = true;
      try {
        await api('DELETE', '/accounts/' + this.deletingAccount.id);
        this.showDeleteModal = false;
        this.deletingAccount = null;
        await this.load();
      } catch (e) {
        console.error('Delete failed:', e);
      } finally {
        this.saving = false;
      }
    },
  };
}
</script>
{% endblock %}
