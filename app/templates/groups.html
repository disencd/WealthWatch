{% extends "base.html" %}
{% block title %}Groups - WealthWatch{% endblock %}
{% block page_title %}Groups{% endblock %}

{% block content %}
<div x-data="groupsPage()" x-init="load()">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Groups</h1>
      <p class="text-sm text-gray-500 mt-1">Create and manage expense-sharing groups</p>
    </div>
    <button @click="showCreate = true"
            class="inline-flex items-center px-4 py-2.5 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 transition shadow-sm">
      <i class="fas fa-plus mr-2"></i>Create Group
    </button>
  </div>

  <!-- Error Alert -->
  <div x-show="error" x-cloak
       class="mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm flex items-center justify-between">
    <span x-text="error"></span>
    <button @click="error=''" class="text-red-500 hover:text-red-700"><i class="fas fa-times"></i></button>
  </div>

  <!-- Success Alert -->
  <div x-show="success" x-cloak
       class="mb-4 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-sm flex items-center justify-between">
    <span x-text="success"></span>
    <button @click="success=''" class="text-green-500 hover:text-green-700"><i class="fas fa-times"></i></button>
  </div>

  <!-- Loading -->
  <div x-show="loading" class="flex justify-center py-12">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-600"></div>
  </div>

  <!-- Groups Grid -->
  <div x-show="!loading" x-cloak class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
    <template x-for="g in groups" :key="g.id">
      <div class="bg-white rounded-xl shadow-sm border p-5 hover:shadow-md transition">
        <!-- Group Header -->
        <div class="flex items-start justify-between mb-3">
          <div class="w-10 h-10 bg-brand-100 rounded-lg flex items-center justify-center">
            <i class="fas fa-users text-brand-600"></i>
          </div>
          <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-600">
            <i class="fas fa-user text-[10px] mr-1"></i>
            <span x-text="g.members.length"></span>
          </span>
        </div>

        <!-- Group Info -->
        <h3 class="font-semibold text-gray-900 text-lg mb-1" x-text="g.name"></h3>
        <p class="text-sm text-gray-500 mb-4 line-clamp-2" x-text="g.description || 'No description'"></p>

        <!-- Member Avatars -->
        <div class="flex items-center">
          <div class="flex -space-x-2">
            <template x-for="(m, i) in g.members.slice(0, 5)" :key="m.id">
              <div class="w-8 h-8 rounded-full border-2 border-white flex items-center justify-center text-white text-xs font-bold bg-brand-500"
                   :class="['bg-brand-500','bg-amber-500','bg-emerald-500','bg-rose-500','bg-cyan-500'][i % 5]"
                   :title="m.first_name + ' ' + m.last_name"
                   x-text="((m.first_name||'')[0]||'').toUpperCase() + ((m.last_name||'')[0]||'').toUpperCase()">
              </div>
            </template>
            <div x-show="g.members.length > 5"
                 class="w-8 h-8 rounded-full border-2 border-white flex items-center justify-center text-xs font-medium bg-gray-200 text-gray-600"
                 x-text="'+' + (g.members.length - 5)">
            </div>
          </div>
          <span class="ml-3 text-xs text-gray-400" x-text="g.members.length + ' member' + (g.members.length !== 1 ? 's' : '')"></span>
        </div>
      </div>
    </template>
  </div>

  <!-- Empty State -->
  <div x-show="!loading && groups.length === 0" x-cloak class="text-center py-16 bg-white rounded-xl border shadow-sm">
    <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <i class="fas fa-users text-gray-400 text-2xl"></i>
    </div>
    <p class="text-gray-500 font-medium">No groups yet</p>
    <p class="text-sm text-gray-400 mt-1">Create a group to start splitting expenses</p>
    <button @click="showCreate = true"
            class="mt-4 inline-flex items-center px-4 py-2 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 transition">
      <i class="fas fa-plus mr-2"></i>Create Your First Group
    </button>
  </div>

  <!-- Create Group Modal -->
  <div x-show="showCreate" x-cloak class="fixed inset-0 z-50 flex items-center justify-center">
    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/50" @click="showCreate = false"></div>
    <!-- Modal -->
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6" @click.stop>
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-lg font-bold text-gray-900">Create Group</h3>
        <button @click="showCreate = false" class="text-gray-400 hover:text-gray-600">
          <i class="fas fa-times text-lg"></i>
        </button>
      </div>
      <form @submit.prevent="create()">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Group Name</label>
          <input type="text" x-model="form.name" required placeholder="e.g. Roommates, Trip to Paris"
                 class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea x-model="form.description" rows="3" placeholder="What's this group for?"
                    class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 resize-none"></textarea>
        </div>
        <div class="flex space-x-3">
          <button type="button" @click="showCreate = false"
                  class="flex-1 px-4 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-medium text-sm transition">
            Cancel
          </button>
          <button type="submit" :disabled="submitting"
                  class="flex-1 px-4 py-2.5 bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium text-sm transition disabled:opacity-50">
            <span x-show="!submitting">Create Group</span>
            <span x-show="submitting"><i class="fas fa-spinner fa-spin mr-1"></i>Creating...</span>
          </button>
        </div>
      </form>
    </div>
  </div>

</div>

<script>
function groupsPage() {
  const token = localStorage.getItem('token');
  const headers = {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'};
  const api = async (method, path, body) => {
    const opts = {method, headers};
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch('/api/v1' + path, opts);
    if (res.status === 401) { window.location.href = '/login'; return null; }
    if (res.status === 204) return null;
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail || 'Failed'); }
    return res.json();
  };

  return {
    groups: [],
    loading: true,
    error: '',
    success: '',
    showCreate: false,
    submitting: false,
    form: { name: '', description: '' },

    async load() {
      try {
        this.groups = await api('GET', '/groups') || [];
      } catch (e) {
        this.error = e.message;
      } finally {
        this.loading = false;
      }
    },

    async create() {
      this.submitting = true;
      this.error = '';
      try {
        await api('POST', '/groups', { name: this.form.name, description: this.form.description });
        this.success = 'Group created successfully!';
        this.showCreate = false;
        this.form = { name: '', description: '' };
        await this.load();
      } catch (e) {
        this.error = e.message;
      } finally {
        this.submitting = false;
      }
    }
  };
}
</script>
{% endblock %}
