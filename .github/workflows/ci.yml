name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Ruff format check
        run: uv run ruff format --check app/ tests/

      - name: Ruff lint
        run: uv run ruff check app/ tests/

      - name: Compile check
        run: |
          uv run python -m py_compile app/main.py
          uv run python -m py_compile app/config.py
          uv run python -m py_compile app/database.py
          uv run python -m py_compile app/auth.py
          for f in app/routers/*.py; do uv run python -m py_compile "$f"; done

      - name: Test
        run: uv run pytest tests/ -v --tb=short
        env:
          JWT_SECRET: ci-test-secret

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: wealthwatch-api:ci
